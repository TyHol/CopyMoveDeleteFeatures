<?xml version="1.0" encoding="UTF-8"?>
<!--
  Feature Manager plugin icon — 24×24
  Three feature rows (solid checkbox + label bar) with a filter funnel hint at top-right.
  Designed as a single-colour silhouette; QField's iconColor tints the fill at runtime.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="black">

    <!-- ── Feature checklist rows ───────────────────────────────────────── -->

    <!-- Row 1 -->
    <rect x="1" y="3"  width="5" height="5" rx="1"/>
    <rect x="8" y="5"  width="10" height="2" rx="1"/>

    <!-- Row 2 -->
    <rect x="1" y="10" width="5" height="5" rx="1"/>
    <rect x="8" y="12" width="10" height="2" rx="1"/>

    <!-- Row 3 (shorter bar — variety suggests a real list) -->
    <rect x="1" y="17" width="5" height="5" rx="1"/>
    <rect x="8" y="19" width="7"  height="2" rx="1"/>

    <!-- ── Filter funnel (top-right corner) ─────────────────────────────── -->
    <!-- Wide mouth at top, narrow spout at bottom -->
    <path d="M20 1 L23 1 L23 2 L21.5 4 L21.5 7 L21 8 L20.5 7 L20.5 4 L19 2 L19 1 Z"/>

  </g>
</svg>
